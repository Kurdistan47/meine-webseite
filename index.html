<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cousin Teller Wahl</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

#container{
    text-align:center;
}

h1{
    font-size:3rem;
    margin-bottom:40px;
}

button{
    padding:15px 35px;
    font-size:24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#gurur{
    background:#4CAF50;
    color:white;
    margin-right:20px;
}

#botan{
    background:#f44336;
    color:white;
    position:absolute;
}

#result{
    font-size:4rem;
    font-weight:bold;
    color:gold;
}

</style>
</head>
<body>

<div id="container">

    <h1>Nächstemal Cousin Teller auf wen? 🤔</h1>

    <button id="gurur">Gurur</button>

</div>

<button id="botan">Botan</button>

<script>

const botan = document.getElementById("botan");

function moveButton(){

    const maxX = window.innerWidth - botan.offsetWidth;
    const maxY = window.innerHeight - botan.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    botan.style.left = x + "px";
    botan.style.top = y + "px";
}

moveButton();

botan.addEventListener("mouseenter", moveButton);

document.getElementById("gurur").addEventListener("click", () => {

    document.body.innerHTML = `
        <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        font-family:Arial;
        font-size:6rem;
        font-weight:bold;
        color:gold;
        background:#111;">
            EHRENCHEF!!! 👑
        </div>
    `;

});

</script>

</body>
</html>
